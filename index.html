<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <Style>

        body{
            background-color: #ebf4fc;
            background-size: cover;
            background-position: center;
            height: 100vh;
            margin: 0;
        }
       #login{
        width: 400px;
        margin: 100px auto;
        padding: 30px;
        border: 2px solid black;
        border-radius: 12px;
        background-color: #f9f9f9;
       }

       footer{
        text-align: center;
        display: block;
        padding: 3px;
        background-color: rgba(0, 0, 0, 0.5);
        height: 35px;
        left: 0;
        bottom: 0;
        width: 100%;
        color: white;
        position: fixed;
       }
    </Style>
</head>
<body>
    <form>
        <div id="login">
            <img src="josubera.png" height="100px" width="100px" style="display: block; margin-left: auto; margin-right: auto;">
            <br><br>
        <h2 style="text-align: center;" >Login Form</h2>
        <label for="uname">Username</label>
            <br>
            <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
            <br>  


        <label for="pwd">Password</label>
            <br>
            <input type="password" id="pwd" class="form-control" placeholder="Enter here" required>
            <br> 
        
        <p id="display"></p>

        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" id="staylogged" onclick="stayloggedinboy()">
            <label class="form-check-label" for="staylogged">Stay logged in?</label>
            <P id="stayinside"></P>
        </div>

        <br>


        <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-success rounded-5" onclick="authenticating()">

        <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-success rounded-5" >

    </form>
</div>

<footer>
    <p>Jarvis Joven, 9-Emerald</p>
</footer>


    <script>
        let attempt_counter = 0;

         function authenticating(){
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";


        while (attempt_counter < 3) {
        if (username === "jarvisis67" && pwd === "67squared") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "index.html";

            break; // stop loop
        }

        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }


        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
            }
        }

        function stayloggedinboy() {
            var checkbox = document.getElementById("staylogged");
            var staylogging = "Your session will stay on this device.";
            switch(checkbox.checked){
                case true: document.getElementById('stayinside').innerHTML = staylogging;   
                break;

                case false: document.getElementById("stayinside").innerHTML = "";
                break;
            }
        }
    </script>
</body>
</html>
